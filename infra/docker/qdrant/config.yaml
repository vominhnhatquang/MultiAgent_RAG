# Qdrant configuration for RAG Chatbot
# Optimized for 10GB RAM constraint (mem_limit: 800m)

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  max_request_size_mb: 32

storage:
  # Use disk-backed storage for large collections (OOM prevention)
  storage_path: /qdrant/storage

  # Flush to disk more aggressively when RAM is tight
  optimizers_config:
    deleted_threshold: 0.2
    vacuum_min_vector_number: 1000
    default_segment_number: 2
    max_segment_size: 200000   # ~200k vectors per segment before flush
    memmap_threshold: 20000    # Use disk for collections > 20k vectors
    indexing_threshold: 10000
    flush_interval_sec: 10
    max_optimization_threads: 1

  wal:
    wal_capacity_mb: 32
    wal_segments_ahead: 0

  performance:
    max_search_threads: 2

  hnsw_index:
    m: 16
    ef_construct: 100
    max_indexing_threads: 1
    on_disk: false

log_level: WARN

cluster:
  enabled: false
